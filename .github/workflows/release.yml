name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        with:
          owner: copybrainapp
          repo: copybrainapp-releases
          tagName: ${{ github.ref_name }}
          releaseName: "CopyBrain ${{ github.ref_name }}"
          releaseCommitish: main
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $dest = "CopyBrain_${version}_x64_portable"
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item "src-tauri/target/release/copybrain.exe" -Destination "$dest/CopyBrain.exe"
          Compress-Archive -Path "$dest/*" -DestinationPath "$dest.zip"

      - name: Upload portable build to release
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" CopyBrain_*_x64_portable.zip --repo copybrainapp/copybrainapp-releases --clobber
